# Samba Configuration File
# Raspberry Pi 4 NAS Server
# Replace YOUR_NEXTCLOUD_ADMIN and YOUR_SAMBA_USERNAME with your actual values

[global]
workgroup = WORKGROUP
server string = RaspberryPi NAS
server role = standalone server
security = user
map to guest = never

# Required for macOS Tahoe 26.3 and iPhone compatibility
vfs objects = catia fruit streams_xattr
fruit:metadata = stream
fruit:model = RackMac
fruit:posix_rename = yes
fruit:nfs_aces = no
fruit:wipe_intentionally_left_blank_rfork = yes
fruit:delete_empty_adfiles = yes

[4TB]
comment = 4TB Hard Drive
path = /mnt/drive4tb/nextcloud-data/YOUR_NEXTCLOUD_ADMIN/files
browseable = yes
read only = no
create mask = 0664
directory mask = 0775
valid users = YOUR_SAMBA_USERNAME
force user = www-data
guest ok = no

[650GB]
comment = 650GB Hard Drive
path = /mnt/650GB
browseable = yes
read only = no
create mask = 0664
directory mask = 0775
valid users = YOUR_SAMBA_USERNAME
force user = www-data
guest ok = no
